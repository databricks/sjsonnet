name: Pull Request Validation

on:
  pull_request_target:
    branches: [master]
    types: [assigned, opened, synchronize, reopened]
    paths-ignore:
      - .github/**

permissions:
  contents: read
  id-token: write

jobs:
  # Forks cannot use org runner groups; use GitHub-hosted runners instead.
  build-jvm:
    runs-on: ${{ github.repository == 'databricks/sjsonnet' && fromJSON('{"group":"databricks-protected-runner-group","labels":"linux-ubuntu-latest"}') || 'ubuntu-latest' }}
    timeout-minutes: 20
    name: Sjsonnet jvm build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
            ref: ${{ github.event.pull_request.head.sha }}
      - uses: ./.github/actions/setup-build
        with:
          sbt: 'true'
          coursier-cache: 'true'
      - name: Check Formatting
        run: ./mill "_.jvm[_].__.checkFormat"
      - name: Run mill tests
        run: ./mill "_.jvm[_].__.test"
      - name: Run sbt tests
        run: sbt test
  build-graal:
    runs-on: ${{ github.repository == 'databricks/sjsonnet' && fromJSON('{"group":"databricks-protected-runner-group","labels":"linux-ubuntu-latest"}') || 'ubuntu-latest' }}
    timeout-minutes: 20
    name: Sjsonnet Graal Native build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
            ref: ${{ github.event.pull_request.head.sha }}
      - uses: ./.github/actions/setup-build
        with:
          coursier-cache: 'true'
      - name: Run Native Image Test Suites
        run: sjsonnet/test/graalvm/run_test_suites.py
  build-other:
    runs-on: ${{ github.repository == 'databricks/sjsonnet' && fromJSON('{"group":"databricks-protected-runner-group","labels":"linux-ubuntu-latest"}') || 'ubuntu-latest' }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        lang: ['js', 'wasm', 'native']
    name: Sjsonnet ${{ matrix.lang }} build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
            ref: ${{ github.event.pull_request.head.sha }}
      - uses: ./.github/actions/setup-build
        with:
          node: ${{ matrix.lang == 'js' || matrix.lang == 'wasm' }}
          sbt: 'true'
          coursier-cache: 'true'
      - name: Check Formatting
        run: ./mill _.${{ matrix.lang }}[_].__.checkFormat
      - name: Run mill tests for ${{ matrix.lang }}
        run: ./mill _.${{ matrix.lang }}[_].__.test
